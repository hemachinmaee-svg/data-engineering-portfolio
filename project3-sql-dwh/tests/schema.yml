version: 2

models:
  - name: fact_transactions
    description: "Grain: one row per financial transaction"
    columns:
      - name: transaction_key
        tests:
          - unique
          - not_null
      - name: customer_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key
      - name: account_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_account')
              field: account_key
      - name: amount
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  - name: dim_customer
    description: "SCD Type 2 customer dimension"
    columns:
      - name: customer_key
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: is_current
        tests:
          - accepted_values:
              values: [0, 1]

  - name: dim_date
    columns:
      - name: date_key
        tests:
          - unique
          - not_null
